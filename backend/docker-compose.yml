version: "3.8"

services:
  sss-backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=/data/sss.db
      - RUST_LOG=sss_backend=info,tower_http=info
    volumes:
      - sss-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  sss-data:
    driver: local
