name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SOLANA_VERSION: "2.3.13"
  ANCHOR_VERSION: "0.32.0"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend (Rust / axum)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Build
        run: cargo build --release

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/package.json

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  sdk-integration:
    name: SDK Integration Tests
    runs-on: ubuntu-latest
    needs: [backend]

    env:
      BOOTSTRAP_API_KEY: sss_integrationtest000000000000000000
      SSS_TEST_API_KEY: sss_integrationtest000000000000000000
      SSS_TEST_BASE_URL: http://127.0.0.1:9876
      DATABASE_URL: ":memory:"
      RATE_LIMIT_CAPACITY: "10000"
      RATE_LIMIT_RPS: "1000"
      PORT: "9876"

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Build backend (release)
        working-directory: backend
        run: cargo build --release

      - name: Start backend
        working-directory: backend
        run: |
          ../target/release/sss-backend &
          # Wait for backend to be ready (up to 30 s)
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9876/api/health && break
            sleep 1
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/package.json

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm install

      - name: Run integration tests
        working-directory: sdk
        run: npm run test:integration

  anchor:
    name: Anchor Programs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm install

      - name: Cache Solana
        uses: actions/cache@v4
        id: cache-solana
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      # NOTE: Do NOT use Swatinem/rust-cache here. The anchor job regenerates
      # Cargo.lock from scratch via `cargo generate-lockfile` and then builds
      # with the Solana 1.18 toolchain (rustc 1.75), which differs from the
      # system rustc used to compute the cache key. Reusing cached build
      # artifacts can cause subtle ABI mismatches between the two toolchains.
      # Omitting the cache keeps each run hermetic and correct.

      - name: Install Anchor CLI
        # @coral-xyz/anchor-cli npm package only goes up to 0.31.x.
        # Anchor 0.32+ is distributed via AVM (cargo-based version manager).
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase --silent

      - name: Generate Cargo.lock
        run: |
          # Solana 2.3 ships cargo/rustc 1.86 — generates lockfile v4, which is
          # fully supported by the bundled Solana cargo. No v3 downgrade needed.
          cargo generate-lockfile
          # blake3 v1.8+ requires `edition2024` Cargo feature, which is NOT
          # supported by Cargo 1.84.0 bundled with Solana platform-tools.
          # Pin to last known-good version. Do NOT remove this pin.
          cargo update blake3 --precise 1.7.0
          # solana-zk-token-sdk v2.3.x has an internal source-level compile error
          # (PedersenCommitment / Pedersen types moved in the 2.3 release). Pin to
          # the last known-good version that compiles with rustc 1.86.
          cargo update -p solana-zk-token-sdk --precise 2.1.21 2>/dev/null || true

      - name: Anchor build
        # Anchor 0.32 uses idl-build feature (stable Rust) for IDL generation —
        # no nightly Rust or RUSTUP_TOOLCHAIN override needed.
        run: anchor build

      - name: Anchor test (localnet)
        # --skip-build reuses the artifacts from the "Anchor build" step above,
        # avoiding a second compile with a potentially different toolchain.
        run: anchor test --skip-build
        # Spawns a local validator, deploys the program, runs tests/sss-token.ts,
        # then tears the validator down. 13 tests covering initialize, mint, burn,
        # pause/unpause, freeze/thaw, update_roles, and revoke_minter.
