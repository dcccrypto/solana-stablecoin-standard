name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SOLANA_VERSION: "1.18.26"
  ANCHOR_VERSION: "0.30.1"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend (Rust / axum)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Build
        run: cargo build --release

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/package.json

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  sdk-integration:
    name: SDK Integration Tests
    runs-on: ubuntu-latest
    needs: [backend]

    env:
      BOOTSTRAP_API_KEY: sss_integrationtest000000000000000000
      SSS_TEST_API_KEY: sss_integrationtest000000000000000000
      SSS_TEST_BASE_URL: http://127.0.0.1:9876
      DATABASE_URL: ":memory:"
      RATE_LIMIT_CAPACITY: "10000"
      RATE_LIMIT_RPS: "1000"
      PORT: "9876"

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Build backend (release)
        working-directory: backend
        run: cargo build --release

      - name: Start backend
        working-directory: backend
        run: |
          ../target/release/sss-backend &
          # Wait for backend to be ready (up to 30 s)
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9876/api/health && break
            sleep 1
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/package.json

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm install

      - name: Run integration tests
        working-directory: sdk
        run: npm run test:integration

  anchor:
    name: Anchor Programs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm install

      - name: Cache Solana
        uses: actions/cache@v4
        id: cache-solana
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      # NOTE: Do NOT use Swatinem/rust-cache here. The anchor job regenerates
      # Cargo.lock from scratch via `cargo generate-lockfile` and then builds
      # with the Solana 1.18 toolchain (rustc 1.75), which differs from the
      # system rustc used to compute the cache key. Reusing cached build
      # artifacts can cause subtle ABI mismatches between the two toolchains.
      # Omitting the cache keeps each run hermetic and correct.

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Install nightly Rust (for IDL generation)
        # anchor build's IDL generation step runs `cargo +nightly test` with
        # RUSTFLAGS="--cfg procmacro2_semver_exempt", which enables super_unstable
        # in proc-macro2 and requires proc_macro::SourceFile. The Solana BPF
        # platform-tools nightly (frozen ~2023) lacks this API. Installing a
        # current system nightly gives anchor a toolchain that has SourceFile.
        # RUSTUP_TOOLCHAIN=nightly tells anchor to use this instead of the
        # Solana-linked nightly when generating the IDL.
        run: rustup toolchain install nightly --no-self-update

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase --silent

      - name: Generate compatible Cargo.lock (v3)
        run: |
          # Solana 1.18 ships cargo ~1.75 which cannot parse lockfile v4.
          # Generate a fresh v3 lockfile so Anchor build succeeds.
          # Also pin blake3 to =1.7.0 (the last edition2021 release) because
          # blake3 >=1.8.0 requires Cargo's edition2024 feature (Cargo >=1.85),
          # which is not available in the Solana 1.18 / Cargo 1.75 toolchain.
          # NOTE: [patch.crates-io] cannot patch crates.io with crates.io itself,
          # so we pin via `cargo update` on the generated lockfile instead.
          cargo generate-lockfile
          # blake3 >=1.8.0 requires edition2024 (Cargo >=1.85); pin to last edition2021 release.
          cargo update blake3 --precise 1.7.0
          # borsh >=1.6.0 requires rustc 1.77.0; Solana 1.18 ships rustc 1.75. Pin to 1.5.1.
          # Multiple versions of borsh exist (0.9.x, 0.10.x, 1.x); target only the 1.x line.
          cargo update borsh@1.6.0 --precise 1.5.1
          # proc-macro-crate >=3.2.0 pulls toml_edit >=0.22 → toml_datetime >=0.7.x (rustc 1.76).
          # proc-macro-crate 3.1.0 uses toml_edit ^0.21.0 → toml_datetime ^0.6.5 (rustc 1.67).
          # borsh-derive 1.5.1 requires ^3, so 3.1.0 satisfies the constraint within rustc 1.75.
          cargo update "proc-macro-crate@3.5.0" --precise 3.1.0
          # indexmap >=2.12.0 requires rustc 1.82; Solana 1.18 ships rustc 1.75. Pin to 2.11.4.
          cargo update "indexmap@2.13.0" --precise 2.11.4
          # spl-pod >=0.2.3 / 0.3.x allows solana-program 2.x (unbounded upper), causing a
          # duplicate-crate type conflict when Cargo resolves two solana-program versions.
          # Workspace deps are pinned to spl-tlv-account-resolution@0.6 / spl-transfer-hook-interface@0.6
          # (which use spl-pod 0.2.x), but pin any remaining 0.2.3 to 0.2.2 as a safety net.
          cargo update "spl-pod@0.2.3" --precise 0.2.2 || true
          sed -i 's/^version = 4$/version = 3/' Cargo.lock

      - name: Anchor build
        # RUSTUP_TOOLCHAIN=nightly directs anchor-lang-idl's build::build() to
        # run `cargo +nightly test` using the system nightly (installed above)
        # rather than the Solana-linked BPF nightly (platform-tools/rust).
        # The system nightly supports proc_macro::SourceFile, which is required
        # when RUSTFLAGS="--cfg procmacro2_semver_exempt" activates super_unstable
        # in proc-macro2 (used by anchor-syn 0.30.1 for IDL source path lookup).
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: anchor build

      - name: Anchor test (localnet)
        run: anchor test
        # Spawns a local validator, deploys the program, runs tests/sss-token.ts,
        # then tears the validator down. 13 tests covering initialize, mint, burn,
        # pause/unpause, freeze/thaw, update_roles, and revoke_minter.
