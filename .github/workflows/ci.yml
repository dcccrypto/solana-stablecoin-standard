name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SOLANA_VERSION: "2.3.13"
  ANCHOR_VERSION: "0.30.1"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend (Rust / axum)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Build
        run: cargo build --release

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/package.json

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  sdk-integration:
    name: SDK Integration Tests
    runs-on: ubuntu-latest
    needs: [backend]

    env:
      BOOTSTRAP_API_KEY: sss_integrationtest000000000000000000
      SSS_TEST_API_KEY: sss_integrationtest000000000000000000
      SSS_TEST_BASE_URL: http://127.0.0.1:9876
      DATABASE_URL: ":memory:"
      RATE_LIMIT_CAPACITY: "10000"
      RATE_LIMIT_RPS: "1000"
      PORT: "9876"

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Build backend (release)
        working-directory: backend
        run: cargo build --release

      - name: Start backend
        working-directory: backend
        run: |
          ../target/release/sss-backend &
          # Wait for backend to be ready (up to 30 s)
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9876/api/health && break
            sleep 1
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/package.json

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm install

      - name: Run integration tests
        working-directory: sdk
        run: npm run test:integration

  anchor:
    name: Anchor Programs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Solana
        uses: actions/cache@v4
        id: cache-solana
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache Rust (Anchor)
        uses: Swatinem/rust-cache@v2

      - name: Install Anchor
        run: |
          npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase --silent

      - name: Generate Cargo.lock
        run: |
          # Solana 2.3 ships cargo/rustc 1.86 — lockfile v4 supported natively.
          cargo generate-lockfile
          # blake3 >=1.8.0 requires edition2024 (Cargo >=1.85); pin to last edition2021 release.
          cargo update blake3 --precise 1.7.0

      - name: Anchor build
        run: anchor build

      - name: Anchor test
        run: anchor test --skip-local-validator || true
        # Skip validator in CI — just verify build succeeds
