[workspace]
members = [
    "programs/sss-token",
    "programs/transfer-hook",
    "backend",
]
resolver = "2"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1

[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1

[patch.crates-io]
# blake3 >=1.8.0 requires edition2024 (Rust/Cargo >=1.85).
# Solana 1.18.x ships Cargo 1.75 in its toolchain; pin blake3 to the
# last edition2021 release so `anchor build` succeeds in CI.
blake3 = { version = "=1.7.0" }

[workspace.dependencies]
anchor-lang = "0.30.1"
anchor-spl = { version = "0.30.1", features = ["token_2022", "token_2022_extensions"] }
spl-token-2022 = { version = "3.0", features = ["no-entrypoint"] }
spl-tlv-account-resolution = "0.7"
spl-transfer-hook-interface = "0.7"
