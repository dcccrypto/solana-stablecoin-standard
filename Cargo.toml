[workspace]
members = [
    "programs/sss-token",
    "programs/transfer-hook",
    "backend",
]
resolver = "2"

[workspace.dependencies]
anchor-lang = "0.30.1"
anchor-spl = { version = "0.30.1", features = ["token_2022", "token_2022_extensions"] }
spl-token-2022 = { version = "3.0", features = ["no-entrypoint"] }
spl-tlv-account-resolution = "0.7"
spl-transfer-hook-interface = "0.7"
